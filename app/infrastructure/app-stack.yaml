AWSTemplateFormatVersion: '2010-09-09'
Description: Sample infrastructure for application deployment

Resources:
  AppBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for sample app
      VpcId: vpc-12345678

Outputs:
  BucketName:
    Value: !Ref AppBucket
  SecurityGroupId:
    Value: !Ref AppSecurityGroup